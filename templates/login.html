<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h3>輕鬆又快速的釣魚紀錄小棧</h3>
        <h2>混跡漁生</h2>

        <p class="footer-text">還沒有帳號？ <a href="/register">立即註冊</a></p>
    </div>
</body>
</html>
