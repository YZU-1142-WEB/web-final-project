<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草圖佈局</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 頂部的大框 -->
    <div id="top-box" class="container"></div>

    <!-- 2. 中間的輸入框 -->
    <!-- 我們使用佔位符文字 (placeholder) 來顯示草圖中的 'input' 文字 -->
    <input id="middle-input" type="text" placeholder="input">

    <!-- 3. 底部的容器和按鈕 -->
    <div id="bottom-container" class="container">
        <button id="bottom-button">Button</button>
    </div>

    <div id="tidal-chart" class="container">
        
    </div>
    <!-- 預留 JavaScript 的位置 -->
    <script src="script.js"></script>
</body>
</html>
