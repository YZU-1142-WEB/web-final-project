<div class="card">
    <h1>歡迎回來，{{ session['username'] }}！</h1>

    <div style="margin: 20px 0; border: 2px dashed #00acc1; padding: 20px; border-radius: 10px;">
        <h3>📸 上傳魚類照片</h3>
        
        <form id="uploadForm">
            <input type="file" id="fileInput" name="file" accept="image/*" required />
            <br /><br />
            <button type="button" onclick="handleUpload()" id="submitBtn"
                style="background: #00acc1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                開始 AI 辨識
            </button>
        </form>
        
        <p id="statusText" style="display:none; color: #00acc1;">正在上傳並準備回首頁...</p>
    </div>

    <a href="{{ url_for('logout') }}">登出</a>
</div>

<script>
async function handleUpload() {
    const fileInput = document.getElementById('fileInput');
    const submitBtn = document.getElementById('submitBtn');
    const statusText = document.getElementById('statusText');

    if (fileInput.files.length === 0) {
        alert("請先選取檔案！");
        return;
    }

    // 禁用按鈕防止重複點擊
    submitBtn.disabled = true;
    submitBtn.innerText = "處理中...";
    statusText.style.display = "block";

    // 準備 FormData
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        // 發送非同步請求到後端
        const response = await fetch('/api/upload', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.status === 'success') {
            // 1. 將任務 ID 存入瀏覽器的 localStorage
            localStorage.setItem('fish_task_id', data.task_id);
            
            // 2. 立即跳轉回首頁
            // 這時候後端的 Thread 正在背景跑 AI
            window.location.href = "{{ url_for('home') }}";
        } else {
            alert("上傳失敗：" + data.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "開始 AI 辨識";
        }
    } catch (error) {
        console.error("Error:", error);
        alert("連線發生錯誤");
        submitBtn.disabled = false;
    }
}
</script>
