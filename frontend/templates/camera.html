<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.card {
				margin: 20px 0;
				border: 2px dashed #00acc1;
				padding: 20px;
				border-radius: 10px;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<a href="/" style="
                display: inline-block;
                margin-bottom: 15px;
                color: #00acc1;
                text-decoration: none;
                font-weight: bold;
                border: 1px solid #00acc1;
                padding: 8px 15px;
                border-radius: 20px;
                transition: background 0.2s;
            " onmouseover="this.style.background='#00acc1'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='#00acc1';">
                ⬅ 回主選單
            </a>
			<h1>恭喜上魚，{{ session['username'] }}！</h1>
			<h3>📸 上傳魚類照片</h3>
			<form id="uploadForm">
				<input
					type="file"
					id="fileInput"
					name="file"
					accept="image/*"
					required
				/>
				<br /><br />
				<button
					type="button"
					onclick="handleUpload()"
					id="submitBtn"
					style="
						background: #00acc1;
						color: white;
						border: none;
						padding: 10px 20px;
						border-radius: 5px;
						cursor: pointer;
					"
				>
					開始 AI 辨識
				</button>
			</form>

			<p id="statusText" style="display: none; color: #00acc1">
				正在上傳並準備回首頁...
			</p>

			<!-- 新增：專屬釣點格子 (預設隱藏，若有釣點才會顯示) -->
			<div
				id="spot-container"
				style="
					display: none;
					margin-top: 30px;
					padding: 15px;
					border: 2px solid #ff9800;
					border-radius: 10px;
					background: #fff8e1;
				"
			>
				<h3 id="spot-title" style="color: #e65100; margin-top: 0"></h3>
				<div style="text-align: center">
					<img
						id="spot-preview"
						src=""
						alt="預覽圖片"
						style="
							max-width: 100%;
							border-radius: 8px;
							display: none;
							margin-top: 10px;
							box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
						"
					/>
					<p
						id="preview-placeholder"
						style="color: #757575; font-size: 14px"
					>
						等待上傳圖片...
					</p>
				</div>
			</div>
		</div>
	</body>
</html>

<script>
	async function handleUpload() {
		// 抓取畫面上的元素
		const fileInput = document.getElementById("fileInput");
		const btn = document.getElementById("submitBtn");
		const statusText = document.getElementById("statusText");

		// 檢查使用者有沒有選擇檔案
		if (!fileInput || fileInput.files.length === 0) {
			alert("請先選擇一張照片！");
			return;
		}

		// 改變按鈕與文字狀態
		const originalText = btn.innerText;
		btn.innerText = "上傳中...";
		btn.disabled = true;
		statusText.style.display = "block"; // 顯示提示文字
		statusText.innerText = "正在上傳照片... ⏳";

		// 打包檔案
		const formData = new FormData();
		formData.append("file", fileInput.files[0]);

		// 🔥 新增：從 localStorage 抓取釣點名稱，並加進表單資料中一起送出
        const spotName = localStorage.getItem("current_fishing_spot");
        if (spotName) {
            formData.append("spot_name", spotName);
        }

		try {
			// 呼叫 Flask 後端 API
			const response = await fetch("/api/picture/upload", {
				method: "POST",
				body: formData,
			});

			const result = await response.json();

			// 如果後端成功接收，開始等待 AI 辨識
			if (result.status === "success") {
				btn.innerText = "AI 辨識中...";
				statusText.innerText = "照片已上傳！AI 正在分析中... 🐟";
				const taskId = result.task_id;
				localStorage.setItem("fish_task_id", taskId);

				// 啟動輪詢檢查
				checkTaskStatus(taskId, btn, originalText, statusText);
			} else {
				alert("錯誤：" + result.message);
				btn.innerText = originalText;
				btn.disabled = false;
				statusText.style.display = "none";
			}
		} catch (error) {
			console.error("上傳發生錯誤:", error);
			alert("無法連線到伺服器，請確認後端有啟動！");
			btn.innerText = originalText;
			btn.disabled = false;
			statusText.style.display = "none";
		}
	}

	// 這個函數會一直去問後端：「好了沒？」
	async function checkTaskStatus(taskId, btn, originalText, statusText) {
		try {
			const response = await fetch(
				`/api/picture/check_task/${taskId}?t=${new Date().getTime()}`,
			);
			const data = await response.json();

			if (data.status === "completed") {
				localStorage.removeItem("fish_task_id");
				statusText.innerText = "🎉 辨識完成！準備跳轉...";
				window.location.href = `/api/picture/result/${taskId}`;
			} else if (data.status === "failed") {
				localStorage.removeItem("fish_task_id");
				alert("辨識失敗：" + data.error_message);
				btn.innerText = originalText;
				btn.disabled = false;
				statusText.style.display = "none";
			} else if (data.status === "not_found") {
				localStorage.removeItem("fish_task_id");
				btn.innerText = originalText;
				btn.disabled = false;
				statusText.style.display = "none";
			} else if (
				data.status === "not_fish" ||
				data.status === "not_TW_fish"
			) {
				localStorage.removeItem("fish_task_id");
				const errorMsg =
					data.status === "not_fish"
						? "❌ 上傳失敗：請上傳魚的照片！"
						: "❌ 上傳失敗：請上傳台灣可釣到的魚種照片！";
				alert(errorMsg);
				btn.innerText = originalText;
				btn.disabled = false;
				statusText.style.display = "none";
				document.getElementById("fileInput").value = "";
			} else {
				statusText.innerText += " .";
				setTimeout(
					() =>
						checkTaskStatus(taskId, btn, originalText, statusText),
					1000,
				);
			}
		} catch (error) {
			btn.innerText = originalText;
			btn.disabled = false;
			statusText.style.display = "none";
		}
	}
</script>

<script>
	// 頁面載入時執行，負責處理釣點顯示與圖片即時預覽
	document.addEventListener("DOMContentLoaded", () => {
		// 從 localStorage 讀取剛剛加入的釣點
		const spotName = localStorage.getItem("current_fishing_spot");
		const spotContainer = document.getElementById("spot-container");
		const spotTitle = document.getElementById("spot-title");
		const fileInput = document.getElementById("fileInput");
		const spotPreview = document.getElementById("spot-preview");
		const previewPlaceholder = document.getElementById(
			"preview-placeholder",
		);

		// 如果有釣點名稱，就把底下的格子顯示出來
		if (spotName) {
			spotContainer.style.display = "block";
			spotTitle.innerText = `📍 釣點: ${spotName}`;
		}

		// 監聽使用者選擇檔案的動作，一選好檔案就馬上顯示預覽圖
		if (fileInput) {
			fileInput.addEventListener("change", function (event) {
				const file = event.target.files[0];
				if (file && spotName) {
					const reader = new FileReader();
					reader.onload = function (e) {
						spotPreview.src = e.target.result; // 將圖片來源設為選取的檔案
						spotPreview.style.display = "inline-block";
						previewPlaceholder.style.display = "none";
					};
					reader.readAsDataURL(file);
				}
			});
		}
	});
</script>
