<!doctype html>
<html>
	<head>
		<title>辨識結果</title>
		<style>
			body {
				background-color: #e0f7fa;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				font-family: sans-serif;
			}
			.card {
				background: white;
				padding: 2rem;
				border-radius: 15px;
				text-align: center;
			}
			img {
				max-width: 300px;
				border-radius: 10px;
				margin: 15px 0;
				border: 3px solid #00acc1;
			}
			.fish-tag {
				font-size: 1.5rem;
				color: #d32f2f;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h2>辨識完畢！</h2>
			<img
				src="{{ url_for('static', filename='uploads/' + img_file) }}"
			/>
			<p>這隻魚是：<span class="fish-tag">{{ fish_name }}</span></p>

            <div style="margin-top: 20px; padding: 15px; background-color: #f1f8e9; border-radius: 10px; text-align: left; color: #424242; line-height: 1.6; border-left: 5px solid #00acc1;">
                <strong>魚類簡介：</strong>
                <p style="margin-top: 8px; font-size: 1rem;">{{ description }}</p>
            </div>

			<br />
			<a href="/">回到主畫面</a>
		</div>
	</body>
</html>
