<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>辨識結果</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles/result.css') }}"
        />
    </head>
    <body>
        <div class="card">
            <h2>辨識完畢！</h2>
            
            <img
                src="{{ img_file }}"
                alt="AI辨識的魚類"
                class="result-image img-fluid rounded"
            />
            
            <p>這隻魚是：<span class="fish-tag">{{ fish_name }}</span></p>

            <div class="description-box">
                <strong>魚類簡介：</strong>
                <p class="description-text">
                    {{ description }}
                </p>
            </div>

            <br />
            <a href="/" class="home-link">回到主畫面</a>
        </div>
    </body>
</html>
