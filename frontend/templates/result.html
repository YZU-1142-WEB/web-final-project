<!doctype html>
<html>
	<head>
		<title>辨識結果</title>
		<style>
			body {
				background-color: #e0f7fa;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				font-family: sans-serif;
			}
			.card {
				background: white;
				padding: 2rem;
				border-radius: 15px;
				text-align: center;
			}
			img {
				max-width: 300px;
				border-radius: 10px;
				margin: 15px 0;
				border: 3px solid #00acc1;
			}
			.fish-tag {
				font-size: 1.5rem;
				color: #d32f2f;
				font-weight: bold;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h2>🎉 辨識完畢！</h2>
			<img
				src="{{ url_for('static', filename='uploads/' + img_file) }}"
				alt="辨識的魚類"
			/>
			<p>這隻魚是：<span class="fish-tag">{{ fish_name }}</span></p>
			{% if fish_score %}
			<p>信心度：<strong>{{ "%.1f" | format(fish_score * 100) }}%</strong></p>
			{% endif %}
			{% if fish_description %}
			<p style="text-align: left; background-color: #f0f0f0; padding: 10px; border-radius: 5px;">
				<strong>📝 介紹：</strong><br>
				{{ fish_description }}
			</p>
			{% endif %}
			<br />
			<a href="/">⬅️ 回到主畫面</a>
		</div>
	</body>
</html>
