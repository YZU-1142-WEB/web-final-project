<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>草圖佈局</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles/index.css') }}"
        />
    </head>
    <body>
        <!-- 1. 頂部的大框 -->
        <div id="top-box" class="container">
            <!-- 上半部內容區 -->
            <div class="top-content"></div>
            <!-- 下半部按鈕區 (橫線由 CSS border 產生) -->
            <a href="{{ url_for('camera_page') }}" style="text-decoration: none;">
            <div class="top-actions">
                <button class="camera-btn">
                    <div class="camera-body">
                        <div class="camera-lens"></div>
                    </div>
                </button>
            </a>
        </div>
    </div>

        <!-- 2. 中間的輸入框 -->
        <input id="middle-input" type="text" placeholder="input" />

        <!-- 3. 底部的容器和按鈕 -->
        <div id="bottom-container" class="container">
            <button id="bottom-button">Button</button>
        </div>
        <!-- 3. 潮汐圖表 -->
        <div id="tidal-chart" class="container"></div>
        <!-- 預留 JavaScript 的位置 -->
        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
