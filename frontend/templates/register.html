<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="UTF-8" />
		<title>註冊帳號</title>
		<link
			rel="stylesheet"
			href="{{ url_for('static', filename='styles/main.css') }}"
		/>
	</head>
	<body>
		<div class="container">
			<h2>註冊新帳號</h2>

			<!-- ✅ 顯示錯誤訊息 (例如：帳號已存在) -->
			{% if error %}
			<p style="color: red; padding: 10px; background-color: #ffe0e0; border-radius: 5px;">
				❌ {{ error }}
			</p>
			{% endif %}

			<form method="POST">
				<input
					type="text"
					name="username"
					placeholder="請輸入帳號"
					required
				/>
				<input
					type="password"
					name="password"
					placeholder="請輸入密碼"
					required
				/>
				<button type="submit">立即註冊</button>
			</form>
			<p class="footer-text">
				已有帳號？ <a href="{{ url_for('login_page') }}">前往登入</a>
			</p>
		</div>
	</body>
</html>
