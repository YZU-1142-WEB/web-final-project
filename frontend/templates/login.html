<!doctype html>
<html>
    <head>
        <title>Login</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles/main.css') }}"
        />
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles/login.css') }}"
        />
    </head>
    <body>
        <div class="container">
            <h3>輕鬆又快速的釣魚紀錄小棧</h3>
            <h2>混跡漁生</h2>

            {% with messages = get_flashed_messages() %} 
                {% if messages %} 
                    {% for message in messages %}
                        <p class="error-message">{{ message }}</p>
                    {% endfor %} 
                {% endif %} 
            {% endwith %}

            <form method="POST">
                <input
                    type="text"
                    name="username"
                    placeholder="帳號"
                    required
                />
                <input
                    type="password"
                    name="password"
                    placeholder="密碼"
                    required
                />
                <button type="submit">登入</button>
            </form>
            <p class="footer-text">
                還沒有帳號？ <a href="{{url_for('register_page')}}">立即註冊</a>
            </p>
        </div>
    </body>
</html>
