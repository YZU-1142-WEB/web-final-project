<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混跡漁生 - 我的專屬釣點圖庫</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #00acc1;
            border-bottom: 2px solid #e0f7fa;
            padding-bottom: 10px;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00acc1;
            text-decoration: none;
            font-weight: bold;
        }
        /* 釣點按鈕選單 */
        .spot-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .spot-btn {
            background: white;
            border: 2px solid #00acc1;
            color: #00acc1;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .spot-btn:hover, .spot-btn.active {
            background: #00acc1;
            color: white;
            box-shadow: 0 3px 8px rgba(0,172,193,0.3);
        }
        /* 照片網格相簿 */
        .gallery-title {
            color: #e65100;
            margin-top: 20px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .fish-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .fish-card:hover {
            transform: translateY(-5px);
        }
        .fish-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .fish-info {
            padding: 12px;
        }
        .fish-name {
            font-weight: bold;
            color: #333;
            margin: 0 0 5px 0;
            font-size: 15px;
        }
        .uploader {
            font-size: 12px;
            color: #757575;
            margin: 0;
        }
        .no-data {
            color: #9e9e9e;
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-btn">⬅ 回首頁</a>
    <h1>📍 我的專屬釣點圖庫</h1>
    <p>請選擇下方釣點，查看你在該處捕獲的所有精采紀錄：</p>

    <div class="spot-menu" id="spotMenu">
        <p style="color: #757575; margin: 5px;">正在載入釣點清單... ⏳</p>
    </div>

    <h2 class="gallery-title" id="currentSpotTitle">請先選取釣點</h2>
    <div class="image-grid" id="imageGrid">
        <div class="no-data">尚未選取任何釣點，或該釣點內目前沒有照片。</div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadMySpots();
    });

    // 1. 載入該使用者創過的所有釣點 (這段維持不變)
    async function loadMySpots() {
        const menuContainer = document.getElementById("spotMenu");
        try {
            const response = await fetch('/api/my_spots');
            const data = await response.json();

            if (data.status === "success" && data.spots.length > 0) {
                menuContainer.innerHTML = ""; 
                
                data.spots.forEach(spot => {
                    const button = document.createElement("button");
                    button.className = "spot-btn";
                    button.innerText = `📍 ${spot}`;
                    button.onclick = () => {
                        document.querySelectorAll('.spot-btn').forEach(btn => btn.classList.remove('active'));
                        button.classList.add('active');
                        loadSpotImages(spot);
                    };
                    menuContainer.appendChild(button);
                });
            } else {
                menuContainer.innerHTML = "<p class='no-data'>目前還沒有建立過任何釣點紀錄喔！</p>";
            }
        } catch (error) {
            console.error("無法載入釣點清單:", error);
            menuContainer.innerHTML = "<p class='no-data' style='color:red;'>伺服器連線失敗</p>";
        }
    }

    // 2. 根據點選的釣點，抓取對應的所有照片 (🔥 這裡新增了釣點刪除按鈕，以及照片卡片上的刪除按鈕)
    async function loadSpotImages(spotName) {
        const gridContainer = document.getElementById("imageGrid");
        const titleContainer = document.getElementById("currentSpotTitle");
        
        titleContainer.innerText = `⚓ 正在讀取...`;
        gridContainer.innerHTML = "<div class='no-data'>載入中... 🐟</div>";

        try {
            const response = await fetch(`/api/spots/${encodeURIComponent(spotName)}/images`);
            const data = await response.json();

            if (data.status === "success" && data.images.length > 0) {
                // 🔥 標題右側加上「刪除此釣點」按鈕
                titleContainer.innerHTML = `
                    🐟【${spotName}】的歷史漁獲紀錄 (${data.images.length} 張)
                    <button onclick="handleDeleteSpot('${spotName}')" style="margin-left: 15px; background: #d32f2f; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 14px;">🗑️ 刪除此釣點</button>
                `;
                
                gridContainer.innerHTML = "";

                data.images.forEach(img => {
                    const card = document.createElement("div");
                    card.className = "fish-card";
                    
                    // 🔥 照片卡片下方加上「刪除照片」按鈕，並傳入 img.id
                    card.innerHTML = `
                        <img src="${img.image_url}" alt="魚類相片" onerror="this.src='https://via.placeholder.com/220x180?text=圖片載入失敗'">
                        <div class="fish-info">
                            <p class="fish-name">${img.fish_type || '未辨識成功'}</p>
                            <p class="uploader" style="margin-bottom: 10px;">🎣 釣客: ${img.username}</p>
                            <button onclick="handleDeletePhoto('${img.id}', '${spotName}')" style="width: 100%; background: #f5f5f5; border: 1px solid #ccc; padding: 5px; border-radius: 5px; cursor: pointer; color: #d32f2f;">🗑️ 刪除照片</button>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            } else {
                titleContainer.innerText = `📌【${spotName}】`;
                gridContainer.innerHTML = "<div class='no-data'>這個釣點目前空空如也，快去釣一隻吧！</div>";
            }
        } catch (error) {
            console.error("相簿載入失敗:", error);
            gridContainer.innerHTML = "<div class='no-data' style='color:red;'>無法取得該釣點的照片</div>";
        }
    }

    // 3. 刪除單張照片的邏輯 (🔥 這裡就是你要的第四步，放在最後面)
    async function handleDeletePhoto(docId, spotName) {
        if (!confirm("確定要刪除這張照片嗎？這個動作無法復原喔！")) {
            return;
        }

        try {
            const response = await fetch(`/api/picture/${docId}`, { method: 'DELETE' });
            const data = await response.json();
            
            if (data.status === "success") {
                alert("照片已成功刪除！");
                loadSpotImages(spotName); // 重新載入這個釣點的照片更新畫面
            } else {
                alert("刪除失敗：" + data.message);
            }
        } catch (error) {
            console.error("刪除照片發生錯誤:", error);
            alert("系統錯誤，無法刪除照片。");
        }
    }

    // 4. 刪除整個釣點的邏輯 (🔥 一樣放在最後面)
    async function handleDeleteSpot(spotName) {
        if (!confirm(`警告：確定要刪除整個【${spotName}】釣點嗎？\n這會把裡面的照片紀錄一併清空，且無法復原！`)) {
            return;
        }

        try {
            const response = await fetch(`/api/spots/${encodeURIComponent(spotName)}`, { method: 'DELETE' });
            const data = await response.json();
            
            if (data.status === "success") {
                alert(`已成功刪除【${spotName}】！`);
                
                if (localStorage.getItem("current_fishing_spot") === spotName) {
                    localStorage.removeItem("current_fishing_spot");
                }

                loadMySpots();
                document.getElementById("currentSpotTitle").innerText = "請先選取釣點";
                document.getElementById("imageGrid").innerHTML = "<div class='no-data'>尚未選取任何釣點，或該釣點內目前沒有照片。</div>";
            } else {
                alert("刪除失敗：" + data.message);
            }
        } catch (error) {
            console.error("刪除釣點發生錯誤:", error);
            alert("系統錯誤，無法刪除釣點。");
        }
    }
</script>
</body>
</html>
